  skill: ticket-triage
  scenario: "Customer bought device 45 days ago, disputes return window"
  conversation:
    - turn: 1
      role: customer
      message: "I want to return my device, it stopped working"
    - turn: 2
      role: agent
      expected_action: "ask for order number"
      expected_tools: ["kb.search_policies"]
    - turn: 3
      role: customer
      message: "Order #DRP-4004, I bought it about 45 days ago"
    - turn: 4
      role: agent
      expected_action: "look up order, search warranty/return policy"
      expected_tools: ["shopify.read_orders", "kb.search_policies"]
    - turn: 5
      role: customer
      message: "The 30-day window is unreasonable for a defective product"
    - turn: 6
      role: agent
      expected_action: "acknowledge concern, escalate for human review as P2 dispute"
      expected_tools: ["human_review.submit"]
    - turn: 7
      role: customer
      message: "So you can't help me?"
    - turn: 8
      role: agent
      expected_action: "explain escalation, set expectation for human follow-up"
      expected_tools: ["gmail.create_draft"]
  expected_final_state:
    ticket_category: "refund-return"
    ticket_priority: "P2"
    order_checked: true
    draft_created: true
    email_sent: false
    human_review_required: true
    policy_referenced: "return-window-dispute"

