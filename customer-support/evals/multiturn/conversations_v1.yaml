      message: "My device won't turn on at all. I've tried charging it overnight"
    - turn: 2
      role: agent
      expected_action: "ask for order number and purchase date"
      expected_tools: ["kb.search_policies"]
    - turn: 3
      role: customer
      message: "Order #DRP-6006, bought 4 months ago"
    - turn: 4
      role: agent
      expected_action: "verify order and warranty eligibility"
      expected_tools: ["shopify.read_orders", "kb.search_policies"]
    - turn: 5
      role: customer
      message: "Yes, it's within the 1-year warranty. What do I do?"
    - turn: 6
      role: agent
      expected_action: "initiate warranty claim, escalate for replacement approval"
      expected_tools: ["human_review.submit"]
    - turn: 7
      role: customer
      message: "Will I get a replacement or repair?"
    - turn: 8
      role: agent
      expected_action: "explain warranty process, draft confirmation"
      expected_tools: ["gmail.create_draft"]
  expected_final_state:
    ticket_category: "warranty"
    ticket_priority: "P2"
    order_checked: true
    draft_created: true
    email_sent: false
    human_review_required: true
    policy_referenced: "warranty-replacement-1yr"

# === MT-007: Repeat contact — frustrated customer (P2) ===

- id: MT-007
