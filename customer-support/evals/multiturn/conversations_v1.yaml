      message: "This is my 4th time contacting you about the same issue. Nobody has helped me"
    - turn: 2
      role: agent
      expected_action: "acknowledge frustration, search repeat-contact policy"
      expected_tools: ["kb.search_policies"]
    - turn: 3
      role: customer
      message: "Order #DRP-7007. I've been waiting 3 weeks for a resolution"
    - turn: 4
      role: agent
      expected_action: "look up order history, check previous tickets"
      expected_tools: ["shopify.read_orders", "kb.search_policies"]
    - turn: 5
      role: customer
      message: "I need this fixed NOW. I can't keep waiting"
    - turn: 6
      role: agent
      expected_action: "escalate as P2 repeat-contact, submit for priority human review"
      expected_tools: ["human_review.submit"]
    - turn: 7
      role: customer
      message: "When will someone actually contact me?"
    - turn: 8
      role: agent
      expected_action: "provide SLA commitment, draft acknowledgment"
      expected_tools: ["gmail.create_draft"]
  expected_final_state:
    ticket_category: "order-status"
    ticket_priority: "P2"
    order_checked: true
    draft_created: true
    email_sent: false
    human_review_required: true
    policy_referenced: "repeat-contact-escalation"

