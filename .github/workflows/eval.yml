name: Agent Evaluation Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      adapter:
        description: 'Adapter to use (mock, hermes, codex, hermes-dry-run)'
        required: false
        default: 'mock'

jobs:
  validate-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      # ─── 1. Schema & Contract Validation ───
      - name: Validate schema consistency
        run: python3 scripts/ci_validate_schema.py

      - name: Check SKILL.md frontmatter
        run: |
          ERRORS=0
          for f in $(find . -name "SKILL.md" -not -path "./.git/*"); do
            if ! grep -q "user_invocable: true" "$f"; then
              echo "::error file=$f::Missing user_invocable: true"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi

      # ─── 2. Pipeline Integrity Test (mock adapter) ───
      # Proves the full pipeline works: generate → schema → hard constraints → eval → regression
      - name: Pipeline integrity test (mock adapter — full generate + eval + regression)
        run: |
          python3 agent-evaluation/runner/run_agent_batch.py \
            --agent customer-support \
            --adapter mock \
            --output-dir customer-support/evals/actual_outputs/current \
            --eval-output customer-support/reports/eval_results.json

      # ─── 3. CI Gate Check ───
      - name: CI Gate check (single-turn triage)
        run: python3 scripts/ci_gate_check.py

      # ─── 4. Permission Gateway Smoke Test ───
      - name: Permission gateway smoke test
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from connectors.runtime import PermissionGateway, Redactor
          gw = PermissionGateway(case_context={'priority':'P1','category':'medical-risk','case_id':'CI-TEST'})
          assert not gw.check('gmail.send_email', {}, 'cs', 'triage').allowed
          assert not gw.check('gmail.create_draft', {}, 'cs', 'triage').allowed
          assert gw.check('kb.search_policies', {'query':'test'}, 'cs', 'triage').allowed
          gw3 = PermissionGateway(case_context={'priority':'P3','category':'refund-return','case_id':'CI-TEST'})
          r = gw3.check('gmail.create_draft', {'to':'a@b.com'}, 'cs', 'triage')
          assert not r.allowed and r.requires_human_review
          red = Redactor()
          assert '[REDACTED_EMAIL]' in red.redact('contact john@example.com')
          assert '[REDACTED_ORDER]' in red.redact('order DRP-1001')
          print('Permission gateway: ALL CHECKS PASSED')
          "

      # ─── 5. Tool Trace Evaluation ───
      # Runs ToolTraceEvaluator with compliant traces + negative violation test
      - name: Tool trace evaluation (compliant + violation detection)
        run: python3 scripts/ci_tool_trace_check.py

      # ─── 6. Multi-turn Conversation + State Diff ───
      # Runs 10 multi-turn conversations, evaluates state diff, blocks on critical mismatch
      - name: Multi-turn conversation + state diff evaluation
        run: python3 scripts/ci_multiturn_check.py

      # ─── 7. Findings Report ───
      - name: Generate evaluation report
        if: always()
        run: |
          python3 scripts/findings_report.py \
            --agent customer-support \
            --output reports/findings.json

      # ─── 8. Real Adapter Test (manual trigger only) ───
      # When triggered via workflow_dispatch with adapter=hermes or codex,
      # runs real agent evaluation. Mock is default for automated CI.
      - name: Real adapter test (if triggered manually)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.adapter != 'mock'
        run: |
          echo "Running real adapter: ${{ github.event.inputs.adapter }}"
          python3 agent-evaluation/runner/run_agent_batch.py \
            --agent customer-support \
            --adapter ${{ github.event.inputs.adapter }} \
            --output-dir customer-support/evals/actual_outputs/current \
            --eval-output customer-support/reports/eval_results_real.json \
            --skip-regression || true
          echo "Real adapter test completed (results in eval_results_real.json)"

      # ─── Upload Artifacts ───
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: |
            reports/
            customer-support/reports/
            experiments/runs/customer-support/
            experiments/reports/
