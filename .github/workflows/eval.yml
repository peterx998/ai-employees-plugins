name: Agent Evaluation Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  validate-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate schema consistency
        run: python3 scripts/ci_validate_schema.py

      - name: Check SKILL.md frontmatter
        run: |
          ERRORS=0
          for f in $(find . -name "SKILL.md" -not -path "./.git/*"); do
            if ! grep -q "user_invocable: true" "$f"; then
              echo "::error file=$f::Missing user_invocable: true"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi

      - name: Evaluate baseline outputs
        run: |
          python3 agent-evaluation/runner/run_eval.py \
            --golden-set customer-support/evals/golden_set_v1.yaml \
            --agent customer-support \
            --actual-dir customer-support/evals/actual_outputs/baseline

      - name: Run mock agent batch (prove pipeline end-to-end)
        run: |
          python3 agent-evaluation/runner/run_agent_batch.py \
            --agent customer-support \
            --adapter mock \
            --output-dir customer-support/evals/actual_outputs/current

      - name: Evaluate mock agent outputs
        run: |
          python3 agent-evaluation/runner/run_eval.py \
            --golden-set customer-support/evals/golden_set_v1.yaml \
            --agent customer-support \
            --actual-dir customer-support/evals/actual_outputs/current

      - name: CI Gate check
        run: python3 scripts/ci_gate_check.py

      - name: Generate report
        if: always()
        run: |
          mkdir -p reports
          echo "## Evaluation Report" > reports/report.md
          echo "- Date: $(date -u)" >> reports/report.md
          echo "- Commit: ${{ github.sha }}" >> reports/report.md
          if [ -f "customer-support/reports/eval_results.json" ]; then
            python3 scripts/ci_gate_check.py >> reports/report.md
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: reports/
